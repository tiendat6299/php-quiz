<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ôn tập Lập trình PHP</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;min-height:100vh;color:#1a1a1a}
#app{max-width:960px;margin:0 auto;padding:1.5rem 1rem}
h1{font-size:26px;font-weight:600;color:#1a1a1a;margin-bottom:6px}
.subtitle{font-size:14px;color:#666;margin-bottom:1.5rem}
.chapters-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
.ch-card{background:#fff;border:1px solid #e0e0e0;border-radius:14px;padding:1.25rem;cursor:pointer;transition:border-color .2s,transform .15s,box-shadow .2s}
.ch-card:hover{border-color:#1D9E75;transform:translateY(-2px);box-shadow:0 4px 16px rgba(29,158,117,.12)}
.ch-badge{display:inline-block;font-size:11px;font-weight:600;background:#E1F5EE;color:#0F6E56;padding:3px 12px;border-radius:20px;margin-bottom:10px;letter-spacing:.3px}
.ch-title{font-size:15px;font-weight:600;color:#1a1a1a;line-height:1.4;margin-bottom:6px}
.ch-meta{font-size:12px;color:#888}
.quiz-wrap{padding:0}
.quiz-nav{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;flex-wrap:wrap;background:#fff;padding:12px 16px;border-radius:12px;border:1px solid #e0e0e0}
.nav-btn{background:transparent;border:1px solid #d0d0d0;border-radius:8px;padding:6px 14px;font-size:13px;color:#555;cursor:pointer;transition:background .15s}
.nav-btn:hover{background:#f5f5f5}
.quiz-title{font-size:14px;font-weight:600;color:#1a1a1a;flex:1;text-align:center}
.quiz-body{display:grid;grid-template-columns:1fr 210px;gap:16px;align-items:start}
@media(max-width:640px){.quiz-body{grid-template-columns:1fr}.sidebar{display:none}}
.q-card{background:#fff;border:1px solid #e0e0e0;border-radius:14px;padding:1.5rem}
.q-num{font-size:12px;color:#1D9E75;font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.q-level{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:10px;margin-bottom:14px}
.lvl-nb{background:#E6F1FB;color:#185FA5}
.lvl-th{background:#EAF3DE;color:#3B6D11}
.lvl-vd{background:#FAEEDA;color:#854F0B}
.q-text{font-size:16px;color:#1a1a1a;line-height:1.65;margin-bottom:1.25rem;font-weight:500}
.options{display:flex;flex-direction:column;gap:9px}
.opt-btn{background:#f8f9fa;border:1.5px solid #e8e8e8;border-radius:10px;padding:11px 16px;text-align:left;font-size:14px;color:#333;cursor:pointer;transition:all .15s;line-height:1.5}
.opt-btn:hover:not([disabled]){background:#E1F5EE;border-color:#1D9E75;color:#0F6E56}
.opt-btn.correct{background:#EAF3DE;border-color:#3B6D11;color:#1a3d0f;font-weight:600}
.opt-btn.wrong{background:#FCEBEB;border-color:#A32D2D;color:#4a1010}
.feedback{margin-top:14px;font-size:13px;padding:10px 14px;border-radius:10px;line-height:1.5}
.fb-correct{background:#EAF3DE;color:#2d6b12;border:1px solid #c0dd97}
.fb-wrong{background:#FCEBEB;color:#8b1f1f;border:1px solid #f7c1c1}
.q-controls{display:flex;justify-content:space-between;margin-top:1.5rem;gap:10px}
.ctrl-btn{padding:9px 20px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid #d0d0d0;background:transparent;color:#555;transition:all .15s}
.ctrl-btn:hover:not([disabled]){background:#f0f0f0}
.ctrl-btn.primary{background:#1D9E75;border-color:#1D9E75;color:#fff}
.ctrl-btn.primary:hover{background:#0F6E56}
.ctrl-btn:disabled{opacity:.35;cursor:not-allowed}
.sidebar{background:#fff;border:1px solid #e0e0e0;border-radius:14px;padding:1.1rem;position:sticky;top:16px}
.sidebar h3{font-size:12px;font-weight:600;color:#888;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.q-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:14px}
.q-dot{width:30px;height:30px;border-radius:7px;border:1.5px solid #e0e0e0;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#999;background:#f8f9fa;transition:all .15s}
.q-dot.active{border-color:#1D9E75;color:#1D9E75;background:#E1F5EE}
.q-dot.done-c{background:#EAF3DE;border-color:#3B6D11;color:#3B6D11}
.q-dot.done-w{background:#FCEBEB;border-color:#A32D2D;color:#A32D2D}
.submit-btn{width:100%;padding:11px;background:#1D9E75;border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s}
.submit-btn:hover{background:#0F6E56}
.result-wrap{display:flex;justify-content:center;align-items:flex-start;padding:2rem 0}
.result-card{background:#fff;border:1px solid #e0e0e0;border-radius:16px;padding:2rem;max-width:480px;width:100%}
.result-score{font-size:56px;font-weight:700;color:#1D9E75;text-align:center;margin:1rem 0 4px}
.result-sub{font-size:15px;color:#555;text-align:center;margin-bottom:1.5rem}
.result-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:1.5rem}
.stat-box{background:#f8f9fa;border-radius:10px;padding:14px;text-align:center;border:1px solid #eee}
.stat-n{font-size:22px;font-weight:700}
.stat-l{font-size:12px;color:#888;margin-top:3px}
.result-actions{display:flex;gap:10px}
.result-actions button{flex:1;padding:11px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;border:1.5px solid #d0d0d0;background:transparent;color:#555;transition:all .15s}
.result-actions button:hover{background:#f0f0f0}
.result-actions .btn-retry{background:#1D9E75;border-color:#1D9E75;color:#fff}
.result-actions .btn-retry:hover{background:#0F6E56}
.progress-bar{height:4px;background:#e0e0e0;border-radius:2px;margin-bottom:1.5rem;overflow:hidden}
.progress-fill{height:100%;background:#1D9E75;border-radius:2px;transition:width .3s}
</style>
</head>
<body>
<div id="app"><div id="screen"></div></div>
<script>
const DATA = {
  chapters: [
    {
      id:1,
      title:"Tổng quan về PHP & Cú pháp cơ bản",

        {q:"PHP được thực thi ở đâu?",opts:["Trình duyệt (client-side)","Máy chủ (server-side)","Cả hai phía","Không bên nào"],ans:1,level:"nb"},
        {q:"Thẻ mở của PHP là gì?",opts:["<php>","<?php","<script>","<%"],ans:1,level:"nb"},

        {q:"Hằng số trong PHP được định nghĩa bằng hàm nào?",opts:["var()","const()","define()","set()"],ans:2,level:"nb"},
        {q:"Toán tử nào dùng để nối chuỗi trong PHP?",opts:["+","&",".","||"],ans:2,level:"nb"},
        {q:"Câu lệnh nào dùng để in ra màn hình trong PHP?",opts:["print_r","console.log","echo","printf_out"],ans:2,level:"nb"},
        {q:"Mảng liên kết (associative array) trong PHP sử dụng gì làm chỉ số?",opts:["Số nguyên","Chuỗi","Cả hai","Không dùng chỉ số"],ans:1,level:"nb"},
        {q:"Vòng lặp nào phù hợp nhất để duyệt qua một mảng PHP?",opts:["for","while","foreach","do...while"],ans:2,level:"nb"},

        {q:"Phần mở rộng file PHP là gì?",opts:[".html",".php",".asp",".js"],ans:1,level:"nb"},

        {q:"Trong mô hình Client-Server, PHP nằm ở tầng nào?",opts:["Client","Server","Database","Cả Client và Server"],ans:1,level:"nb"},
        {q:"XAMPP là công cụ dùng để làm gì?",opts:["Tạo website tĩnh","Cài đặt môi trường phát triển PHP local","Quản lý domain","Thiết kế giao diện"],ans:1,level:"nb"},
        {q:"$_SERVER['DOCUMENT_ROOT'] trả về thông tin gì?",opts:["Tên domain","Đường dẫn thư mục gốc của website trên server","IP của server","Phiên bản PHP"],ans:1,level:"nb"},
        {q:"Toán tử === trong PHP kiểm tra điều gì?",opts:["Chỉ giá trị","Chỉ kiểu dữ liệu","Cả giá trị lẫn kiểu","Không kiểm tra gì"],ans:2,level:"th"},

        {q:"Khi nào nên dùng switch thay vì if...else?",opts:["Luôn luôn","Khi so sánh một biến với nhiều giá trị cụ thể","Khi cần so sánh khoảng giá trị","Khi điều kiện phức tạp"],ans:1,level:"th"},
        {q:"Hàm explode() trong PHP làm gì?",opts:["Nối các chuỗi lại","Tách chuỗi thành mảng theo dấu phân cách","Đảo ngược chuỗi","Tìm kiếm trong chuỗi"],ans:1,level:"th"},
        {q:"Giá trị của $a sau đoạn code: $a = 5; $a += 3; là bao nhiêu?",opts:["5","3","8","15"],ans:2,level:"th"},

        {q:"Hàm implode() làm gì trong PHP?",opts:["Tách chuỗi","Nối các phần tử mảng thành chuỗi","Sắp xếp mảng","Tìm phần tử trong mảng"],ans:1,level:"th"},
        {q:"Phân biệt Static Website và Dynamic Website: điểm khác biệt chính là gì?",opts:["Dynamic web nhanh hơn","Dynamic web tạo nội dung theo yêu cầu, static thì không","Static web dùng PHP","Dynamic web không cần server"],ans:1,level:"th"},

        {q:"Cho $s = 'Hello World'; strtolower($s) trả về gì?",opts:["HELLO WORLD","hello world","Hello World","Hello world"],ans:1,level:"vd"},

        {q:"Hàm array_merge() khác array_push() ở điểm nào?",opts:["Không khác gì","array_merge nối hai mảng lại, array_push thêm phần tử","array_merge xóa phần tử","array_push nối mảng"],ans:1,level:"vd"},
        {q:"Trong PHP, do...while khác while ở điểm nào?",opts:["Không khác gì","do...while chạy ít nhất một lần dù điều kiện sai","while nhanh hơn","do...while không có điều kiện"],ans:1,level:"vd"},
        {q:"Hàm str_replace('a','b','banana') trả về gì?",opts:["bbnbnb","bbnbnb","bbnbnb","bbnbnb"],ans:0,level:"vd"},
        {q:"Để lấy 3 ký tự đầu của chuỗi $s, dùng hàm nào?",opts:["substr($s,0,3)","strpos($s,3)","strlen($s,3)","str_split($s,3)"],ans:0,level:"vd"},
        {q:"Kết quả của var_dump(true) là gì?",opts:["1","bool(true)","true","string"],ans:1,level:"vd"},
        {q:"Tại sao nên dùng hằng số (define) thay vì biến cho các giá trị cố định?",opts:["Tốc độ nhanh hơn","Tránh thay đổi giá trị vô tình, code rõ ràng hơn","Không cần ký tự $","Tất cả đều đúng"],ans:3,level:"vd"},
        {q:"Hàm array_slice($arr, 1, 3) lấy ra bao nhiêu phần tử?",opts:["1","3","4","2"],ans:1,level:"vd"},
        {q:"Cho $a = '5'; $b = 5; var_dump($a == $b) trả về gì?",opts:["bool(false)","bool(true)","int(1)","NULL"],ans:1,level:"vd"},
      ]
    },
    {
      id:2,
      title:"Xử lý Form và Quản lý trạng thái",
      questions:[
        {q:"Siêu biến nào chứa dữ liệu gửi từ form dùng method POST?",opts:["$_GET","$_POST","$_REQUEST","$_FORM"],ans:1,level:"nb"},
        {q:"Phương thức GET gửi dữ liệu như thế nào?",opts:["Trong body của request","Qua URL","Qua cookie","Qua session"],ans:1,level:"nb"},
        {q:"Cookie được lưu ở đâu?",opts:["Máy chủ","Database","Trình duyệt của người dùng","File server"],ans:2,level:"nb"},
        {q:"Session trong PHP được lưu ở đâu mặc định?",opts:["Trình duyệt","Database","Máy chủ","Cookie"],ans:2,level:"nb"},
        {q:"Hàm nào dùng để bắt đầu một session trong PHP?",opts:["session_start()","start_session()","session_begin()","init_session()"],ans:0,level:"nb"},
        {q:"Siêu biến nào chứa thông tin về file được upload?",opts:["$_POST","$_FILES","$_SERVER","$_ENV"],ans:1,level:"nb"},
        {q:"Hàm move_uploaded_file() dùng để làm gì?",opts:["Xóa file upload","Di chuyển file từ thư mục tạm sang thư mục đích","Đọc nội dung file","Nén file"],ans:1,level:"nb"},
        {q:"Hàm setcookie() phải được gọi trước hay sau khi xuất HTML?",opts:["Sau","Trước","Không quan trọng","Cùng lúc"],ans:1,level:"nb"},

        {q:"Hàm trim() trong PHP dùng để làm gì?",opts:["Cắt chuỗi ở vị trí bất kỳ","Xóa khoảng trắng đầu và cuối chuỗi","Đếm ký tự","Chuyển thành chữ hoa"],ans:1,level:"nb"},
        {q:"Siêu biến $_SERVER['REQUEST_METHOD'] trả về giá trị gì khi dùng form POST?",opts:["GET","POST","SUBMIT","FORM"],ans:1,level:"nb"},

        {q:"$_SESSION['user'] = 'admin' lưu giá trị này ở đâu?",opts:["Cookie trình duyệt","URL","Bộ nhớ server","Database"],ans:2,level:"nb"},
        {q:"Phương thức GET có giới hạn dung lượng dữ liệu hay không?",opts:["Không giới hạn","Có, do giới hạn độ dài URL","Chỉ giới hạn bởi RAM","Giới hạn 100MB"],ans:1,level:"nb"},
        {q:"Hàm session_destroy() làm gì?",opts:["Tạm dừng session","Xóa toàn bộ dữ liệu session","Đổi session ID","Lưu session vào DB"],ans:1,level:"nb"},
        {q:"$_SERVER['DOCUMENT_ROOT'] trả về thông tin gì?",opts:["Tên domain","Đường dẫn thư mục gốc của website trên server","IP của server","Phiên bản PHP"],ans:1,level:"nb"},
        {q:"Ưu điểm chính của POST so với GET khi gửi form là gì?",opts:["Nhanh hơn","Dữ liệu không hiển thị trên URL, bảo mật hơn","Không cần server","Lưu được vào bookmark"],ans:1,level:"th"},

        {q:"Hàm password_hash() trong PHP dùng để làm gì?",opts:["So sánh mật khẩu","Mã hóa mật khẩu an toàn","Tạo mật khẩu ngẫu nhiên","Giải mã mật khẩu"],ans:1,level:"nb"},
        {q:"Hàm htmlspecialchars() dùng để làm gì?",opts:["Xóa HTML","Chuyển ký tự đặc biệt HTML thành entities, ngăn XSS","Thêm HTML","Validate HTML"],ans:1,level:"nb"},
        {q:"HTTPS khác HTTP ở điểm gì?",opts:["HTTPS nhanh hơn","HTTPS mã hóa dữ liệu truyền tải bằng SSL/TLS","HTTPS không cần server","HTTPS miễn phí hơn"],ans:1,level:"nb"},
        {q:"Prepared statements ngăn SQL Injection bằng cách nào?",opts:["Mã hóa toàn bộ query","Tách SQL code và data, input không được interpret như SQL","Chặn kết nối","Xóa ký tự đặc biệt"],ans:1,level:"nb"},
        {q:"Hàm password_verify() dùng để làm gì?",opts:["Tạo hash mới","Kiểm tra mật khẩu nhập vào có khớp với hash đã lưu","Đổi mật khẩu","Xóa mật khẩu"],ans:1,level:"nb"},
        {q:"CSRF token là gì?",opts:["Token đăng nhập","Chuỗi ngẫu nhiên gắn vào form để xác nhận request hợp lệ","Cookie bảo mật","Session ID"],ans:1,level:"nb"},
        {q:"strip_tags() trong PHP làm gì?",opts:["Thêm HTML tag","Xóa toàn bộ HTML và PHP tags khỏi chuỗi","Validate tag","Mã hóa tag"],ans:1,level:"nb"},
        {q:"Thuật toán nào được PHP khuyến nghị dùng trong password_hash()?",opts:["MD5","SHA1","PASSWORD_BCRYPT hoặc PASSWORD_DEFAULT","SHA256"],ans:2,level:"nb"},
        {q:"Tại sao không nên dùng MD5 để hash mật khẩu?",opts:["MD5 chậm","MD5 không còn an toàn, dễ bị brute-force và rainbow table","MD5 không có trong PHP","MD5 quá dài"],ans:1,level:"nb"},
        {q:"Error reporting nên được tắt trên môi trường production vì sao?",opts:["Tốn tài nguyên","Tránh lộ thông tin hệ thống cho kẻ tấn công","Làm chậm server","Không cần thiết"],ans:1,level:"nb"},
        {q:"Lỗ hổng XSS xảy ra khi nào?",opts:["Server bị hack","Ứng dụng hiển thị input người dùng mà không escape, cho phép chạy script độc hại","Database bị xóa","File bị đánh cắp"],ans:1,level:"nb"},
        {q:"Input filtering trong PHP dùng để làm gì?",opts:["Làm sạch và kiểm tra dữ liệu đầu vào trước khi xử lý","Lọc file","Kiểm tra IP","Mã hóa output"],ans:0,level:"nb"},
        {q:"Tại sao cần validate input cả ở client và server?",opts:["Client validation đủ rồi","Client validation dễ bypass, server validation là bắt buộc để bảo mật thực sự","Server validation chậm","Để code đẹp hơn"],ans:1,level:"th"},
        {q:"Phân biệt authentication và authorization:",opts:["Giống nhau","Authentication xác thực danh tính, authorization kiểm tra quyền truy cập","Authorization nhanh hơn","Authentication chỉ dùng với admin"],ans:1,level:"th"},
        {q:"SQL Injection có thể gây ra hậu quả gì nghiêm trọng nhất?",opts:["Làm chậm website","Đọc, sửa, xóa toàn bộ database hoặc bypass login","Làm hỏng giao diện","Chặn email"],ans:1,level:"th"},
        {q:"Tại sao nên dùng HTTPS thay vì HTTP cho trang có form đăng nhập?",opts:["HTTPS nhanh hơn","Mã hóa dữ liệu đăng nhập, ngăn chặn nghe lén (man-in-the-middle)","HTTPS bắt buộc theo luật","HTTPS miễn phí"],ans:1,level:"th"},
        {q:"Stored XSS khác Reflected XSS ở điểm nào?",opts:["Không khác","Stored XSS lưu script vào database, ảnh hưởng nhiều người; Reflected chỉ qua URL","Reflected nguy hiểm hơn","Stored XSS không nguy hiểm"],ans:1,level:"th"},
        {q:"Tại sao không nên hiển thị chi tiết lỗi database ra browser trong production?",opts:["Tốn dung lượng","Lộ cấu trúc database, thông tin kết nối cho kẻ tấn công","Làm chậm tải trang","Người dùng khó hiểu"],ans:1,level:"th"},
        {q:"CSRF attack hoạt động như thế nào?",opts:["Hack trực tiếp server","Lừa trình duyệt nạn nhân gửi request đến site đang đăng nhập mà họ không hay biết","Đọc cookie người dùng","Chặn kết nối mạng"],ans:1,level:"th"},
        {q:"Bcrypt trong password hashing có đặc điểm gì?",opts:["Nhanh nhất","Có cost factor, chậm có chủ ý để chống brute-force","Không reversible và không có salt","Ngắn nhất"],ans:1,level:"th"},
        {q:"Nguyên tắc Least Privilege trong bảo mật có nghĩa là gì?",opts:["Dùng ít code nhất","Mỗi thành phần chỉ có quyền tối thiểu cần thiết để hoạt động","Ít người dùng nhất","Ít server nhất"],ans:1,level:"th"},
        {q:"Tại sao cần sanitize output khi hiển thị dữ liệu người dùng?",opts:["Để format đẹp hơn","Ngăn XSS bằng cách escape ký tự HTML đặc biệt trước khi hiển thị","Để tăng tốc độ","Để lưu vào database"],ans:1,level:"th"},
        {q:"File inclusion vulnerability xảy ra khi nào?",opts:["Include file CSS","Dùng input người dùng trực tiếp trong include/require mà không validate","Dùng quá nhiều include","Include file không tồn tại"],ans:1,level:"th"},
        {q:"Rate limiting dùng để ngăn chặn loại tấn công nào?",opts:["SQL Injection","Brute-force tấn công login và DDoS","XSS","CSRF"],ans:1,level:"th"},
        {q:"Cách đúng để hash mật khẩu trong PHP là gì?",opts:["md5($password)","sha1($password)","password_hash($password, PASSWORD_DEFAULT)","base64_encode($password)"],ans:2,level:"vd"},
        {q:"Code đúng để ngăn XSS khi hiển thị input người dùng là gì?",opts:["echo $input","echo strip_tags($input)","echo htmlspecialchars($input, ENT_QUOTES, 'UTF-8')","echo addslashes($input)"],ans:2,level:"vd"},
        {q:"Đoạn code nào có lỗ hổng SQL Injection?",opts:["$stmt=$pdo->prepare('SELECT * FROM users WHERE id=?'); $stmt->execute([$id])","$sql=\"SELECT * FROM users WHERE id=$id\"; $pdo->query($sql)","Cả hai đều an toàn","Không đoạn nào"],ans:1,level:"vd"},
        {q:"Code đúng để kiểm tra mật khẩu khi đăng nhập là gì?",opts:["if($input == $storedHash)","if(password_verify($input, $storedHash))","if(md5($input) == $storedHash)","if($input === $storedHash)"],ans:1,level:"vd"},
        {q:"Để tạo CSRF token và lưu vào session, code đúng là gì?",opts:["$token = 'csrf123'","$token=bin2hex(random_bytes(32)); $_SESSION['csrf']=$token","$token=time()","$token=session_id()"],ans:1,level:"vd"},
        {q:"Khi nhận form POST, cách verify CSRF token đúng là gì?",opts:["Kiểm tra $_POST['token'] !== null","hash_equals($_SESSION['csrf'], $_POST['token'])","$_POST['token'] == 'csrf'","Không cần verify"],ans:1,level:"vd"},
        {q:"Để ngăn hiển thị lỗi PHP trong production, cần đặt gì trong php.ini?",opts:["display_errors = On","display_errors = Off; log_errors = On","error_reporting = 0","Tắt PHP"],ans:1,level:"vd"},
        {q:"Code nào an toàn để lấy ID từ URL và truy vấn database?",opts:["$id=$_GET['id']; $pdo->query(\"SELECT * FROM p WHERE id=$id\")","$id=(int)$_GET['id']; $stmt=$pdo->prepare('SELECT * FROM p WHERE id=?'); $stmt->execute([$id])","$id=htmlspecialchars($_GET['id']); $pdo->query('SELECT * FROM p WHERE id='.$id)","Tất cả đều an toàn"],ans:1,level:"vd"},
        {q:"Whitelist vs Blacklist validation: cách nào an toàn hơn?",opts:["Blacklist","Whitelist - chỉ cho phép giá trị biết trước là hợp lệ","Cả hai như nhau","Không dùng cái nào"],ans:1,level:"vd"},
        {q:"Sau khi gọi password_hash(), lưu kết quả vào database cần cột có độ dài tối thiểu bao nhiêu?",opts:["32 ký tự","60 ký tự (khuyến nghị 255 để tương lai)","16 ký tự","100 ký tự"],ans:1,level:"vd"},
        {q:"Tại sao nên dùng HTTPS với flag Secure cho Cookie?",opts:["Cookie nhanh hơn","Cookie chỉ được gửi qua kết nối HTTPS, ngăn bị đánh cắp qua HTTP","Cookie được mã hóa","Cookie sống lâu hơn"],ans:1,level:"th"},
        {q:"Content Security Policy (CSP) header dùng để làm gì?",opts:["Tăng tốc tải trang","Kiểm soát nguồn tài nguyên được phép tải, giảm nguy cơ XSS","Nén file CSS","Cache tài nguyên"],ans:1,level:"th"},
        {q:"Prepared statement với named parameters trong PDO dùng cú pháp nào?",opts:["SELECT * FROM u WHERE id=?","SELECT * FROM u WHERE id=:id","SELECT * FROM u WHERE id=$id","SELECT * FROM u WHERE id=@id"],ans:1,level:"vd"},
      ]
    }
  ]
};

let state = {view:'home', chapterIdx:null, qIdx:0, answers:{}, submitted:false};

function render(){
  const s = document.getElementById('screen');
  if(state.view==='home') s.innerHTML = renderHome();
  else if(state.view==='quiz') s.innerHTML = renderQuiz();
  else if(state.view==='result') s.innerHTML = renderResult();
  attachEvents();
}

function renderHome(){
  return `<div>
    <h1>Ôn tập Lập trình PHP</h1>
    <p class="subtitle">5 chương &middot; 40 câu/chương &middot; Nhận biết · Thông hiểu · Vận dụng</p>
    <div class="chapters-grid">
      ${DATA.chapters.map((ch,i)=>`
        <div class="ch-card" data-ch="${i}">
          <div class="ch-badge">Chương ${ch.id}</div>
          <div class="ch-title">${ch.title}</div>
          <div class="ch-meta">40 câu hỏi &middot; Nhấn để bắt đầu</div>
        </div>
      `).join('')}
    </div>
  </div>`;
}

function renderQuiz(){
  const ch = DATA.chapters[state.chapterIdx];
  const q = ch.questions[state.qIdx];
  const ans = state.answers;
  const levelMap = {nb:'Nhận biết',th:'Thông hiểu',vd:'Vận dụng'};
  const levelClass = {nb:'lvl-nb',th:'lvl-th',vd:'lvl-vd'};
  const answered = ans[state.qIdx] !== undefined;
  const userAns = ans[state.qIdx];
  const progress = Math.round((state.qIdx+1)/ch.questions.length*100);
  return `<div class="quiz-wrap">
    <div class="quiz-nav">
      <button class="nav-btn" id="btn-home">← Trang chủ</button>
      <div class="quiz-title">Chương ${ch.id}: ${ch.title}</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    <div class="quiz-body">
      <div class="q-card">
        <div class="q-num">Câu hỏi ${state.qIdx+1} / ${ch.questions.length}</div>
        <span class="q-level ${levelClass[q.level]}">${levelMap[q.level]}</span>
        <div class="q-text">${q.q}</div>
        <div class="options">
          ${q.opts.map((opt,i)=>{
            let cls='opt-btn';
            if(answered){
              if(i===q.ans) cls+=' correct';
              else if(i===userAns && userAns!==q.ans) cls+=' wrong';
            }
            return `<button class="${cls}" data-oidx="${i}" ${answered?'disabled':''}>${String.fromCharCode(65+i)}. ${opt}</button>`;
          }).join('')}
        </div>
        ${answered?`<div class="feedback ${userAns===q.ans?'fb-correct':'fb-wrong'}">${userAns===q.ans?'✓ Chính xác!':'✗ Sai rồi! Đáp án đúng: '+String.fromCharCode(65+q.ans)+'. '+q.opts[q.ans]}</div>`:''}
        <div class="q-controls">
          <button class="ctrl-btn" id="btn-prev" ${state.qIdx===0?'disabled':''}>← Trước</button>
          <button class="ctrl-btn primary" id="btn-next">${state.qIdx===ch.questions.length-1?'Xem kết quả →':'Câu tiếp →'}</button>
        </div>
      </div>
      <div class="sidebar">
        <h3>Danh sách câu hỏi</h3>
        <div class="q-grid">
          ${ch.questions.map((_,i)=>{
            let cls='q-dot';
            if(i===state.qIdx) cls+=' active';
            else if(ans[i]!==undefined) cls+=ans[i]===ch.questions[i].ans?' done-c':' done-w';
            return `<button class="${cls}" data-qjump="${i}">${i+1}</button>`;
          }).join('')}
        </div>
        <button class="submit-btn" id="btn-submit">Nộp Bài Ngay</button>
      </div>
    </div>
  </div>`;
}

function renderResult(){
  const ch = DATA.chapters[state.chapterIdx];
  const ans = state.answers;
  let correct=0,wrong=0,skip=0;
  ch.questions.forEach((q,i)=>{
    if(ans[i]===undefined) skip++;
    else if(ans[i]===q.ans) correct++;
    else wrong++;
  });
  const total=ch.questions.length;
  const pct=Math.round(correct/total*100);
  const grade = pct>=80?'Giỏi 🏆':pct>=65?'Khá 👍':pct>=50?'Trung bình':'Cần cố gắng hơn';
  return `<div class="result-wrap">
    <div class="result-card">
      <div style="font-size:16px;font-weight:600;color:#1a1a1a;text-align:center">Kết quả: Chương ${ch.id}</div>
      <div class="result-score">${pct}%</div>
      <div class="result-sub">${grade} &middot; ${correct}/${total} câu đúng</div>
      <div class="result-stats">
        <div class="stat-box"><div class="stat-n" style="color:#3B6D11">${correct}</div><div class="stat-l">Đúng</div></div>
        <div class="stat-box"><div class="stat-n" style="color:#A32D2D">${wrong}</div><div class="stat-l">Sai</div></div>
        <div class="stat-box"><div class="stat-n" style="color:#888">${skip}</div><div class="stat-l">Bỏ qua</div></div>
      </div>
      <div class="result-actions">
        <button id="btn-retry" class="btn-retry">Làm lại</button>
        <button id="btn-back-home">Về trang chủ</button>
      </div>
    </div>
  </div>`;
}

function attachEvents(){
  document.querySelectorAll('[data-ch]').forEach(el=>{
    el.addEventListener('click',()=>{
      state={view:'quiz',chapterIdx:parseInt(el.dataset.ch),qIdx:0,answers:{},submitted:false};
      render();
    });
  });
  const home=document.getElementById('btn-home');
  if(home) home.addEventListener('click',()=>{state.view='home';render();});
  const prev=document.getElementById('btn-prev');
  if(prev) prev.addEventListener('click',()=>{if(state.qIdx>0){state.qIdx--;render();}});
  const next=document.getElementById('btn-next');
  if(next) next.addEventListener('click',()=>{
    const ch=DATA.chapters[state.chapterIdx];
    if(state.qIdx<ch.questions.length-1){state.qIdx++;render();}
    else{state.view='result';render();}
  });
  const submit=document.getElementById('btn-submit');
  if(submit) submit.addEventListener('click',()=>{state.view='result';render();});
  document.querySelectorAll('.opt-btn[data-oidx]').forEach(el=>{
    el.addEventListener('click',()=>{
      if(state.answers[state.qIdx]===undefined){
        state.answers[state.qIdx]=parseInt(el.dataset.oidx);
        render();
      }
    });
  });
  document.querySelectorAll('[data-qjump]').forEach(el=>{
    el.addEventListener('click',()=>{state.qIdx=parseInt(el.dataset.qjump);render();});
  });
  const retry=document.getElementById('btn-retry');
  if(retry) retry.addEventListener('click',()=>{
    state={view:'quiz',chapterIdx:state.chapterIdx,qIdx:0,answers:{},submitted:false};
    render();
  });
  const backHome=document.getElementById('btn-back-home');
  if(backHome) backHome.addEventListener('click',()=>{state.view='home';render();});
}

render();
</script>
